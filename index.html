<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceNotes AI — Legal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    color: #1c1c1e;
    background: linear-gradient(135deg, #5B4BFF 0%, #8377FF 50%, #FF6B4A 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #000;
  }
  .sub {
    font-size: 15px;
    color: #6e6e73;
    margin-bottom: 32px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .link {
    display: block;
    padding: 16px 20px;
    background: #f5f5f7;
    color: #5B4BFF;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    transition: background 0.2s;
  }
  .link:hover {
    background: #e8e8ed;
  }
  .footer {
    margin-top: 32px;
    font-size: 13px;
    color: #86868b;
  }
  .footer a { color: #5B4BFF; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>VoiceNotes AI</h1>
    <p class="sub">Legal documents</p>
    <div class="links">
      <a href="privacy.html" class="link">Privacy Policy / Gizlilik Politikası</a>
      <a href="terms.html" class="link">Terms of Use / Kullanım Koşulları</a>
    </div>
    <div class="footer">
      Made by <a href="mailto:support@bestsoft.com.tr">BestSoft</a>
    </div>
  </div>
</body>
</html>
